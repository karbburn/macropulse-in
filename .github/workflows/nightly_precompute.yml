name: Nightly Precompute

on:
  schedule:
    - cron: '30 1 * * *'    # 01:30 UTC = 07:00 IST
  workflow_dispatch:          # Allow manual trigger from GitHub Actions UI

jobs:
  precompute:
    runs-on: ubuntu-latest
    concurrency:
      group: nightly-precompute
      cancel-in-progress: false   # let the running job finish
    timeout-minutes: 30       # Safety net — normal run is ~10 min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install --no-deps yfinance==1.4.1

      - name: Run nightly precompute
        run: python backend/scripts/precompute_nightly.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DATAGOV_API_KEY: ${{ secrets.DATAGOV_API_KEY }}
